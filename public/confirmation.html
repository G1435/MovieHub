<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmation</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1>Booking Confirmation</h1>
        <p>Thank you for your booking!</p>
        <div id="booking-details">
            <h2>Your Booking Details</h2>
            <p><strong>Movie:</strong> <span id="movie-title"></span></p>
            <p><strong>Date:</strong> <span id="booking-date"></span></p>
            <p><strong>Time:</strong> <span id="booking-time"></span></p>
            <p><strong>Seats:</strong> <span id="selected-seats"></span></p>
            <p><strong>Total Price:</strong> $<span id="total-price"></span></p>
        </div>
        <button id="go-home">Go to Home</button>
    </div>
    <script src="js/utils.js"></script>
    <script src="js/booking.js"></script>
</body>
</html>
